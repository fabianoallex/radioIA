sources:
- id: clipping
  type: clipping
  name: Clipping
  enabled: true
  settings:
    max_sources: 5          # máximo de veículos a incluir
    days_lookback: 1        # só artigos dos últimos N dias
    fetch_content: true     # extrai texto completo via trafilatura
    max_content_chars: 2000 # limite de caracteres por artigo
    agregadores:            # ordem não implica prioridade — seleção é balanceada (round-robin)
      - google_news         # padrão — sem chave de API
      - bing_news           # padrão — sem chave de API

- id: clipping-auto
  type: clipping_auto
  name: Clipping Automático
  enabled: false
  settings:
    max_topics: 1           # tópicos a identificar (usa o 1º)
    max_sources: 5          # veículos por tópico
    days_lookback: 1
    fetch_content: true
    max_content_chars: 2000
    llm_model: claude-haiku-4-5-20251001
    agregadores:
      - google_news
      - bing_news
    trending_feeds:         # RSS dos portais para descoberta de manchetes
      - https://g1.globo.com/rss/g1/
      - https://feeds.folha.uol.com.br/emcimadahora/rss091.xml
      - https://feeds.bbci.co.uk/portuguese/rss.xml
      - https://rss.uol.com.br/feed/noticias.xml      

- id: clipping-economia
  type: clipping_auto
  name: "Clipping Economia"
  enabled: false
  settings:
    categoria: economia        # LLM foca em tópicos de economia
    max_topics: 3
    max_sources: 5
    topic_history_days: 7
    topic_cooldown_hours: 4

- id: clipping-esportes
  type: clipping_auto
  name: "Clipping Esportes"
  enabled: false
  settings:
    categoria: esportes
    max_topics: 3
    max_sources: 5
    topic_history_days: 3      # esportes mudam mais rápido
    topic_cooldown_hours: 4

- id: clipping-entretenimento
  type: clipping_auto
  name: "Clipping Entretenimento"
  enabled: false
  settings:
